worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        xrootd on;
        xrootd_root {DATA_DIR};
        xrootd_auth none;
        xrootd_access_log {LOG_DIR}/xrootd_access.log;
    }
}

worker_processes 2;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

http {
    access_log            {LOG_DIR}/access.log;
    client_body_temp_path {TMP_DIR}/client_body;
    proxy_temp_path       {TMP_DIR}/proxy;
    fastcgi_temp_path     {TMP_DIR}/fastcgi;
    uwsgi_temp_path       {TMP_DIR}/uwsgi;
    scgi_temp_path        {TMP_DIR}/scgi;

    # Source (auth required)
    server {
        listen {SOURCE_REQUIRED_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        xrootd_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            xrootd_webdav         on;
            xrootd_webdav_root    {SOURCE_REQUIRED_ROOT};
            xrootd_webdav_cafile  {CA_PEM};
            xrootd_webdav_auth    required;
            xrootd_webdav_allow_write on;
        }
    }

    # Source (no auth)
    server {
        listen {SOURCE_OPEN_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        xrootd_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            xrootd_webdav         on;
            xrootd_webdav_root    {SOURCE_OPEN_ROOT};
            xrootd_webdav_cafile  {CA_PEM};
            xrootd_webdav_auth    none;
            xrootd_webdav_allow_write on;
        }
    }

    # Dest (TPC via CA file)
    server {
        listen {DEST_CAFILE_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        xrootd_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            xrootd_webdav         on;
            xrootd_webdav_root    {DEST_CAFILE_ROOT};
            xrootd_webdav_cafile  {CA_PEM};
            xrootd_webdav_auth    required;
            xrootd_webdav_allow_write on;
            xrootd_webdav_tpc on;
            xrootd_webdav_tpc_cert {CLIENT_CERT};
            xrootd_webdav_tpc_key {CLIENT_KEY};
            xrootd_webdav_tpc_cafile {CA_PEM};
            xrootd_webdav_tpc_timeout 10;
        }
    }

    # Dest (TPC via CA directory)
    server {
        listen {DEST_CADIR_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        xrootd_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            xrootd_webdav         on;
            xrootd_webdav_root    {DEST_CADIR_ROOT};
            xrootd_webdav_cadir   {CA_DIR};
            xrootd_webdav_auth    required;
            xrootd_webdav_allow_write on;
            xrootd_webdav_tpc on;
            xrootd_webdav_tpc_cert {CLIENT_CERT};
            xrootd_webdav_tpc_key {CLIENT_KEY};
            xrootd_webdav_tpc_cadir {CA_DIR};
            xrootd_webdav_tpc_timeout 10;
        }
    }

    # Dest (TPC without service cert)
    server {
        listen {DEST_NO_SERVICE_CERT_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        xrootd_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            xrootd_webdav         on;
            xrootd_webdav_root    {DEST_NO_SERVICE_CERT_ROOT};
            xrootd_webdav_cafile  {CA_PEM};
            xrootd_webdav_auth    required;
            xrootd_webdav_allow_write on;
            xrootd_webdav_tpc on;
            xrootd_webdav_tpc_cafile {CA_PEM};
            xrootd_webdav_tpc_timeout 10;
        }
    }

    # Dest (TPC disabled)
    server {
        listen {DEST_DISABLED_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        xrootd_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            xrootd_webdav         on;
            xrootd_webdav_root    {DEST_DISABLED_ROOT};
            xrootd_webdav_cafile  {CA_PEM};
            xrootd_webdav_auth    required;
            xrootd_webdav_allow_write on;
            xrootd_webdav_tpc off;
        }
    }

    # Dest (read-only with TPC)
    server {
        listen {DEST_READONLY_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        xrootd_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            xrootd_webdav         on;
            xrootd_webdav_root    {DEST_READONLY_ROOT};
            xrootd_webdav_cafile  {CA_PEM};
            xrootd_webdav_auth    required;
            xrootd_webdav_allow_write off;
            xrootd_webdav_tpc on;
            xrootd_webdav_tpc_cert {CLIENT_CERT};
            xrootd_webdav_tpc_key {CLIENT_KEY};
            xrootd_webdav_tpc_cafile {CA_PEM};
            xrootd_webdav_tpc_timeout 10;
        }
    }
}

###############################################################################
# xrootd.perf.conf — official xrootd v5 server for load-test comparison
#
# Mirrors the nginx-xrootd perf config:
#   12094  XRootD root:// + GSI (primary comparison)
#   12443  HTTPS/WebDAV + x509 client cert via XrdHttp
#
# Start:
#   mkdir -p /tmp/xrd-perf-xrd/{admin,run,logs}
#   xrootd -c /path/to/tests/xrootd.perf.conf \
#           -l /tmp/xrd-perf-xrd/logs/xrootd.log -b
###############################################################################

# ---- Runtime directories --------------------------------------------------
all.adminpath /tmp/xrd-perf-xrd/admin
all.pidpath   /tmp/xrd-perf-xrd/run

# ---- Export the same test data as nginx-xrootd ----------------------------
# Keep the client-visible namespace identical to nginx-xrootd:
# root://host//load_1g.bin resolves to /tmp/xrd-test/data/load_1g.bin.
oss.localroot /tmp/xrd-test/data
all.export /

# ---- Listen port ---------------------------------------------------------
xrd.port 12094

# ---- Network: disable reverse-DNS (required on WSL2 / NAT environments) -
xrd.network nodnr

# ---- Allow all hosts -----------------------------------------------------
xrd.allow host *

# ---- Threading -----------------------------------------------------------
xrd.sched mint 8 avlt 16 maxt 256 idle 780

# ---- Security: load the GSI dispatcher -----------------------------------
xrootd.seclib /usr/lib64/libXrdSec-5.so

sec.protocol gsi \
    -certdir:/tmp/xrd-test/pki/ca \
    -cert:/tmp/xrd-test/pki/server/hostcert.pem \
    -key:/tmp/xrd-test/pki/server/hostkey.pem \
    -gridmap:none \
    -gmapopt:10

sec.protbind * gsi

# ---- Access control ------------------------------------------------------
acc.authdb /tmp/xrd-perf-xrd/authdb

# ---- XrdHttp: HTTPS + WebDAV + x509 client-certificate auth on 12443 -----
#
# libXrdHttp-5.so serves HTTP/WebDAV over TLS.
# libXrdHttpVOMS-5.so (→ libXrdVoms-5.so) acts as the secxtractor: it
# extracts the subject DN from the TLS client certificate and presents it
# to the authorization framework, enabling x509 proxy-cert auth identical
# to the root:// GSI path.  The same authdb (u * / rl) authorizes reads.
#
xrd.protocol XrdHttp:12443 /usr/lib64/libXrdHttp-5.so

# Server TLS identity
http.cert /tmp/xrd-test/pki/server/hostcert.pem
http.key  /tmp/xrd-test/pki/server/hostkey.pem

# CA used to verify client certificates presented during TLS handshake
http.cadir /tmp/xrd-test/pki/ca

# Extract x509 DN from the client cert for authz (proxy cert chains supported)
http.secxtractor /usr/lib64/libXrdHttpVOMS-5.so

# Map all authenticated DNs to a single local user (mirrors -gmapopt:10 above)
http.gridmap /dev/null
http.desthttps yes
